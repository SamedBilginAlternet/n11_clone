server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Always set a container label from the container name.
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

      # Set service label from docker-compose service name.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service

      # Drop infra containers — keep only app services.
      - source_labels: [container]
        regex: 'n11-postgres|n11-rabbitmq|n11-elasticsearch|n11-jaeger|n11-prometheus|n11-grafana|n11-loki|n11-promtail|n11-frontend'
        action: drop

    pipeline_stages:
      - docker: {}

      # Spring Boot line shape:
      #   2026-04-22 14:23:45.678 INFO  [corrId,traceId] com.x.Y - message
      - regex:
          expression: '^(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3})\s+(?P<level>[A-Z]+)\s+\[(?P<correlationId>[^,]*),(?P<traceId>[^\]]*)\]\s+(?P<logger>\S+)\s+-\s+(?P<msg>.*)$'

      - labels:
          level:
          correlationId:
          traceId:
