server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s

    relabel_configs:
      # Container name is always present — use it as primary label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

      # Set job label so every stream has at least one guaranteed label
      - target_label: job
        replacement: n11

      # Drop infra containers
      - source_labels: [container]
        regex: 'n11-(postgres|rabbitmq|redis|elasticsearch|jaeger|otel-collector|prometheus|grafana|loki|promtail|eureka|frontend)'
        action: drop

    pipeline_stages:
      - docker: {}
      - regex:
          expression: '^(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3})\s+(?P<level>[A-Z]+)\s+\[(?P<correlationId>[^,]*),(?P<traceId>[^\]]*)\]\s+(?P<logger>\S+)\s+-\s+(?P<msg>.*)$'
      - labels:
          level:
