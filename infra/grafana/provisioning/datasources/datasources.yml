apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    # Clicking a span's log icon jumps to Loki logs keyed by traceId
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        tags: [{ key: 'traceId', value: 'traceId' }]
        filterByTraceID: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: "traceId=([a-f0-9]+)"
          url: "$${__value.raw}"
          datasourceUid: jaeger
