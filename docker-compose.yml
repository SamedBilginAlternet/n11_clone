services:
  postgres:
    image: postgres:16-alpine
    container_name: n11-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authdb
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c shared_buffers=64MB -c work_mem=4MB -c maintenance_work_mem=32MB -c effective_cache_size=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    entrypoint: ["sh", "-c", "echo '#!/bin/sh\npsql -U postgres -c \"CREATE DATABASE basketdb\" || true\npsql -U postgres -c \"CREATE DATABASE productdb\" || true\npsql -U postgres -c \"CREATE DATABASE orderdb\" || true\npsql -U postgres -c \"CREATE DATABASE paymentdb\" || true\npsql -U postgres -c \"CREATE DATABASE notificationdb\" || true\npsql -U postgres -c \"CREATE DATABASE reviewdb\" || true\npsql -U postgres -c \"CREATE DATABASE inventorydb\" || true' > /docker-entrypoint-initdb.d/01.sh && chmod +x /docker-entrypoint-initdb.d/01.sh && exec docker-entrypoint.sh postgres -c shared_buffers=64MB -c work_mem=4MB"]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: n11-rabbitmq
    hostname: n11-rabbitmq
    user: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.85"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-15672}:5672"
      - "${RABBITMQ_MGMT_PORT:-25672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: n11-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru

  eureka-server:
    build: ./services/eureka-server
    container_name: n11-eureka
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
    ports:
      - "${EUREKA_PORT:-18761}:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: on-failure

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: n11-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    expose:
      - "4317"
      - "4318"
      - "8889"
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: n11-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: http://prometheus:9090
      PROMETHEUS_QUERY_NORMALIZE_CALLS: "true"
      PROMETHEUS_QUERY_NORMALIZE_DURATION: "true"
    ports:
      - "${JAEGER_UI_PORT:-26686}:16686"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.1.0
    container_name: n11-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-13100}:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  promtail:
    image: grafana/promtail:3.1.0
    container_name: n11-promtail
    user: root
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: n11-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=1d
      - --storage.tsdb.retention.size=256MB
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.1.0
    container_name: n11-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-13001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: n11-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "${ELASTICSEARCH_PORT:-19200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Application Services ──────────────────────────────────────
  # All JVMs capped at 192MB heap to fit in 8GB total RAM.

  auth-service:
    build: ./services/auth-service
    container_name: n11-auth
    environment: &service-env-auth
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      JWT_SECRET: ${JWT_SECRET:-3f6a2b8c1d4e5f7a9b0c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a}
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      JWT_ACCESS_TOKEN_EXPIRY: "900000"
      JWT_REFRESH_TOKEN_EXPIRY: "604800000"
    depends_on: &depends-pg-rmq-eureka
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck: &service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: on-failure

  basket-service:
    build: ./services/basket-service
    container_name: n11-basket
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/basketdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      JWT_SECRET: ${JWT_SECRET:-3f6a2b8c1d4e5f7a9b0c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a}
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on: *depends-pg-rmq-eureka
    expose:
      - "8081"
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
    restart: on-failure

  product-service:
    build: ./services/product-service
    container_name: n11-product
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/productdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    expose:
      - "8082"
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
    restart: on-failure

  order-service:
    build: ./services/order-service
    container_name: n11-order
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      JWT_SECRET: ${JWT_SECRET:-3f6a2b8c1d4e5f7a9b0c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a}
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on: *depends-pg-rmq-eureka
    expose:
      - "8083"
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
    restart: on-failure

  payment-service:
    build: ./services/payment-service
    container_name: n11-payment
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      JWT_SECRET: ${JWT_SECRET:-3f6a2b8c1d4e5f7a9b0c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a}
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on: *depends-pg-rmq-eureka
    expose:
      - "8084"
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
    restart: on-failure

  notification-service:
    build: ./services/notification-service
    container_name: n11-notification
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notificationdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      JWT_SECRET: ${JWT_SECRET:-3f6a2b8c1d4e5f7a9b0c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a}
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on: *depends-pg-rmq-eureka
    expose:
      - "8085"
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
    restart: on-failure

  review-service:
    build: ./services/review-service
    container_name: n11-review
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reviewdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-3f6a2b8c1d4e5f7a9b0c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a}
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    expose:
      - "8086"
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
    restart: on-failure

  inventory-service:
    build: ./services/inventory-service
    container_name: n11-inventory
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on: *depends-pg-rmq-eureka
    expose:
      - "8088"
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health || exit 1"]
    restart: on-failure

  search-service:
    build: ./services/search-service
    container_name: n11-search
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      PRODUCT_SERVICE_URI: http://product-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      elasticsearch:
        condition: service_healthy
      product-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    expose:
      - "8087"
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health || exit 1"]
    restart: on-failure

  api-gateway:
    build: ./services/api-gateway
    container_name: n11-gateway
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
      EUREKA_URI: http://eureka-server:8761/eureka
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      eureka-server:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: n11-frontend
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-13000}:80"
    restart: on-failure

volumes:
  postgres_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  loki_data:
  redis_data:
  rabbitmq_data:
