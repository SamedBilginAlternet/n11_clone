name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-flight runs on the same branch when new commits land.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: ${{ matrix.service }} (mvn test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - basket-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - review-service
          - search-service
          - inventory-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        working-directory: services/${{ matrix.service }}
        # search-service has no tests yet (needs ES) and api-gateway is config-only;
        # still run `verify` so compilation + packaging are validated.
        run: mvn -B -ntp verify

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # No lockfile committed yet; fall back to `npm install` so CI doesn't
        # need a committed package-lock.json just to be green on first run.
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi

      - name: Type-check + build
        run: npm run build
