spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false   # Flyway skipped — Hibernate creates schema directly for tests

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256!!
  access-token-expiry: 900000
  refresh-token-expiry: 604800000
