server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API calls to the gateway so browser sees a single origin
    # (eliminates CORS preflights in production).
    location /api/ {
        proxy_pass http://api-gateway:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all non-file routes hit React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Short cache on html, long on fingerprinted assets
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(js|css|svg|png|jpg|jpeg|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
