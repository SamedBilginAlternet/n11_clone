server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # WebSocket proxy for real-time notifications
    location /ws/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $gateway http://api-gateway:8000;
        proxy_pass $gateway$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Proxy API calls to the gateway so browser sees a single origin
    # (eliminates CORS preflights in production).
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $gateway http://api-gateway:8000;
        proxy_pass $gateway$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all non-file routes hit React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Short cache on html, long on fingerprinted assets
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(js|css|svg|png|jpg|jpeg|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
